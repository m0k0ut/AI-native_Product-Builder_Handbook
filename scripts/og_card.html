<!DOCTYPE html>
<!--
  Social preview (Open Graph) card for The AI-native Product Builder's Handbook.
  Regenerate docs/og.png after any title/positioning change:

    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
      --headless --disable-gpu --force-device-scale-factor=1 --hide-scrollbars \
      --window-size=1200,630 --screenshot=docs/og.png \
      "file://$PWD/scripts/og_card.html"
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: radial-gradient(125% 125% at 82% -10%, #17142e 0%, #050507 56%);
    color: #f5f5f7;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 86px; position: relative; -webkit-font-smoothing: antialiased;
  }
  .brand { position: absolute; top: 60px; left: 86px; display: flex; align-items: center; gap: 18px; }
  .mark {
    width: 60px; height: 60px; border-radius: 15px;
    background: linear-gradient(135deg, #7d7bff, #5e5ce6);
    display: flex; align-items: center; justify-content: center;
    font-size: 38px; font-weight: 800; color: #fff;
    box-shadow: 0 8px 30px rgba(94, 92, 230, 0.45);
  }
  .brand-text { font-size: 21px; font-weight: 600; color: #c9c9d4; letter-spacing: 0.2px; }
  .edition {
    align-self: flex-start; font-size: 17px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: #b3a8ff;
    background: rgba(125, 123, 255, 0.14); border: 1px solid rgba(125, 123, 255, 0.32);
    padding: 8px 18px; border-radius: 999px; margin-bottom: 26px;
  }
  h1 {
    font-size: 76px; line-height: 1.04; font-weight: 800; letter-spacing: -1.6px;
    background: linear-gradient(135deg, #f5f5f7 26%, #8f8cff 120%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    max-width: 1010px; margin-bottom: 28px;
  }
  .lede { font-size: 29px; line-height: 1.42; color: #b6b6c0; max-width: 950px; margin-bottom: 30px; }
  .stats { font-size: 22px; font-weight: 600; color: #8a8a92; letter-spacing: 0.3px; }
  .url { position: absolute; bottom: 56px; left: 86px; font-size: 20px; font-weight: 500; color: #6c6c78; }
</style>
</head>
<body>
  <div class="brand">
    <div class="mark">B</div>
    <div class="brand-text">AI-native Builder's Handbook</div>
  </div>
  <span class="edition">2026 Edition</span>
  <h1>The AI-native Product Builder's Handbook</h1>
  <div class="lede">A practical guide to modern product thinking for the AI-native Product Manager &amp; Builder.</div>
  <div class="stats">10 Parts · 30 Chapters · 2 Glossaries</div>
  <div class="url">m0k0ut.github.io/AI-native_Product-Builder_Handbook</div>
</body>
</html>
